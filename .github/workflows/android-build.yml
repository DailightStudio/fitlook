name: Android Build & Release

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 수동 트리거

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build AAB with Docker
        run: |
          docker build -t fitlook-builder .
          docker run --rm -v ${{ github.workspace }}:/workspace fitlook-builder

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: fitlook-release.aab
          path: android/app/build/outputs/bundle/release/*.aab

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/bundle/release/*.aab

  # Google Play 배포 (선택사항)
  deploy-playstore:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: fitlook-release.aab

      - name: Deploy to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.fitlook.app
          releaseFiles: '*.aab'
          track: internal
          inAppUpdatePriority: 5
